name: Build Zexo Studio

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ hashFiles('src-tauri/Cargo.lock') }}
      
      - name: Install LLVM
        run: choco install llvm -y

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.6.0'
          method: 'network'
      
      - name: Install dependencies
        run: npm install

      - name: Generate icons
        run: |
          npm install sharp
          node -e "require('sharp')('src/assets/logo.png').resize(1024,1024,{fit:'contain',background:{r:0,g:0,b:0,alpha:0}}).toFile('src/assets/logo-square.png').then(()=>console.log('done'))"
          npx tauri icon src/assets/logo-square.png

      - name: Fix engine.rs
        run: |
          (Get-Content src-tauri/src/llm/engine.rs) -replace '\.token_to_str\(new_token, Default::default\(\)\)', '.token_to_piece(new_token, false)' | Set-Content src-tauri/src/llm/engine.rs

      - name: Build
        run: npm run tauri build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zexo-studio-windows
          path: src-tauri/target/release/bundle/*
